name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  GOPROXY: https://goproxy.cn,direct
  GONOSUMDB: "*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: CGO_ENABLED=0 go test ./... -count=1

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build all platforms
        run: make build-all VERSION=${{ github.ref_name }} COMMIT=${{ github.sha }}

      - name: Generate checksums
        run: |
          cd bin
          sha256sum inconnect-* > checksums.txt
          cat checksums.txt

      - name: Extract release notes
        id: notes
        run: |
          TAG=${{ github.ref_name }}
          if [ -f CHANGELOG.md ]; then
            sed -n "/^## ${TAG}/,/^## v/{/^## v/!p}" CHANGELOG.md | sed '1d' > /tmp/release_notes.md
          fi
          if [ ! -s /tmp/release_notes.md ]; then
            echo "Release ${TAG}" > /tmp/release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.2.1
        with:
          body_path: /tmp/release_notes.md
          files: |
            bin/inconnect-*
            bin/checksums.txt

      # Mirror release assets to the China S3 bucket so 'inconnect update' can
      # fall back to it when GitHub is unreachable. Reuses the shared
      # incloud-cli-releases bucket under the inconnect-cli prefix; the
      # update command's HttpSource resolves {BaseURL}/inhandnet/inconnect-cli/.
      # Skipped (continue-on-error) when AWS_CN_* secrets aren't configured.
      - name: Sync to S3 mirror (China)
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_CN_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_CN_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: cn-north-1
        run: |
          TAG=${{ github.ref_name }}
          BUCKET=incloud-cli-releases
          PREFIX=inhandnet/inconnect-cli

          # Upload binaries and checksums
          aws s3 cp bin/ "s3://${BUCKET}/${PREFIX}/${TAG}/" \
            --recursive --exclude "*" --include "inconnect-*" --include "checksums.txt"

          # Download existing manifest or start fresh
          aws s3 cp "s3://${BUCKET}/${PREFIX}/manifest.yaml" manifest.yaml 2>/dev/null || true

          # Update manifest with new release
          pip install pyyaml -q
          python3 scripts/update-s3-manifest.py \
            --tag "${TAG}" \
            --bin-dir bin \
            --notes-file /tmp/release_notes.md \
            --manifest manifest.yaml

          # Upload updated manifest
          aws s3 cp manifest.yaml "s3://${BUCKET}/${PREFIX}/manifest.yaml"

  # Keep the inconnect-skills plugin's command references in sync with each CLI
  # release: regenerate them from this tag's command tree and push to the
  # skills repo. Requires a SKILLS_SYNC_TOKEN secret with write access to
  # inhandnet/inconnect-skills (a fine-grained PAT or deploy key).
  sync-skills:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout inconnect-cli
        uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Checkout inconnect-skills
        uses: actions/checkout@v5
        with:
          repository: inhandnet/inconnect-skills
          token: ${{ secrets.SKILLS_SYNC_TOKEN }}
          path: inconnect-skills

      - name: Regenerate command references
        run: make docs DOCS_DIR=inconnect-skills/skills/inconnect/references/commands

      - name: Commit and push if changed
        run: |
          cd inconnect-skills
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain skills/inconnect/references/commands)" ]; then
            git add skills/inconnect/references/commands
            git commit -m "Sync command references for inconnect-cli ${{ github.ref_name }}"
            git push
          else
            echo "No command reference changes for ${{ github.ref_name }}."
          fi
